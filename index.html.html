html, body {

.card {

  max-width: 480px;
  overflow: hidden;
}
.top {
  background: #1a7a2a;
  width: 100%;
  padding: 36px 22px 48px;
}
.person-name {
  font-size: 32px;
  font-weight: 800;
  color: #ffffff;
  line-height: 1.15;
}
.person-role {
  font-size: 12px;
  font-weight: 600;
  color: rgba(255,255,255,0.75);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-top: 6px;
}
.co-name-line {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  margin-top: 12px;
  font-weight: 400;
}
.curve {
  display: block;
  width: 100%;
  line-height: 0;
  background: #0a0a0a;
}
.curve svg {
  display: block;
  width: 100%;
  height: auto;
}
.bottom {
  background: #0a0a0a;
  width: 100%;
  padding: 8px 16px 24px;
}
.contact-list { display: flex; flex-direction: column; gap: 8px; }
.clink {
  display: flex;
  align-items: center;
  gap: 12px;
  background: #141414;
  border: 1px solid #242424;
  border-radius: 14px;
  padding: 12px 14px;
  text-decoration: none;
  -webkit-tap-highlight-color: transparent;
}
.clink:active { background: #1a2a1a; border-color: #2e8b35; }
.ibox {
  width: 38px; height: 38px;
  border-radius: 9px;
  background: #1e1e1e;
  border: 1px solid #2a2a2a;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.ibox svg { width: 18px; height: 18px; }
.ctext { flex: 1; min-width: 0; }
.clabel {
  font-size: 10px;
  color: #3a9f42;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 700;
}
.cval {
  font-size: 13px;
  color: #cccccc;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.carr { color: #2e8b35; font-size: 20px; flex-shrink: 0; line-height: 1; }
.actions {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}
.abtn {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  background: #141414;
  border: 1px solid #242424;
  border-radius: 14px;
  padding: 13px 6px;
  text-decoration: none;
  -webkit-tap-highlight-color: transparent;
}
.abtn:active { background: #1a2a1a; border-color: #2e8b35; }
.abtn svg { width: 22px; height: 22px; }
.alabel {
  font-size: 9px;
  color: #4caf50;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 700;
}
.footer-loc {
  display: flex; align-items: flex-start; gap: 8px;
  margin-top: 10px;
  padding: 11px 13px;
  background: #111111;
  border-radius: 12px;
  border: 1px solid #1e1e1e;
}
.footer-loc svg { flex-shrink: 0; margin-top: 2px; }
.loc-text { font-size: 11px; color: #555555; line-height: 1.6; }
